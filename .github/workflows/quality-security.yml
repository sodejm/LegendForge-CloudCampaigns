name: Quality and Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pre-commit-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6 # v4

      - name: Install TruffleHog
        env:
          TRUFFLEHOG_VERSION: 3.95.8
          TRUFFLEHOG_SHA256: 136c42933697ab2e09402d003ff4259086312b80cb671e7d9ab05477597bc4f0
        run: |
          curl -sSfL -o /tmp/trufflehog.tar.gz "https://github.com/trufflesecurity/trufflehog/releases/download/v${TRUFFLEHOG_VERSION}/trufflehog_${TRUFFLEHOG_VERSION}_linux_amd64.tar.gz"
          echo "${TRUFFLEHOG_SHA256}  /tmp/trufflehog.tar.gz" | sha256sum --check
          sudo tar -xzf /tmp/trufflehog.tar.gz -C /usr/local/bin trufflehog
          rm /tmp/trufflehog.tar.gz
          trufflehog --version

      - name: Install hook runtime tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Cache hook scanners
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cache/pre-commit
            ~/.cache/semgrep
          key: ${{ runner.os }}-hooks-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit hooks (pull requests)
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: pre-commit run --from-ref "origin/$BASE_REF" --to-ref "HEAD" --hook-stage pre-commit --show-diff-on-failure

      - name: Run pre-commit hooks (push)
        if: github.event_name == 'push'
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: pre-commit run --from-ref "$BEFORE_SHA" --to-ref "$CURRENT_SHA" --hook-stage pre-commit --show-diff-on-failure

      - name: Run pre-push hooks
        run: pre-commit run --all-files --hook-stage pre-push --show-diff-on-failure
