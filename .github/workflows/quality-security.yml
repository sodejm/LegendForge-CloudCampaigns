name: Quality and Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pre-commit-gates:
    runs-on: ubuntu-latest
    env:
      # TruffleHog runs through its official action below. Keep the local hooks
      # enabled for developers without scanning the same commits twice in CI.
      SKIP: trufflehog-precommit,trufflehog-prepush

    steps:
      - name: Checkout
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v4.1.0
        with:
          fetch-depth: 0

      - name: Scan commits for secrets
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
        with:
          extra_args: --results=verified,unknown

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Cache pre-commit environments
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-py3.12-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-py3.12-

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@19a52fbac37dacb22a09518e4ef6ee234f2d4987 # v4.0.0

      - name: Install hook runtime tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pre-commit semgrep

      - name: Run pre-commit hooks
        run: pre-commit run --all-files --hook-stage pre-commit --show-diff-on-failure

      - name: Run pre-push hooks
        run: pre-commit run --all-files --hook-stage pre-push --show-diff-on-failure
