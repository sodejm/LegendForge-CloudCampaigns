name: Quality and Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pre-commit-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Install TruffleHog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin
          trufflehog --version

      - name: Install hook runtime tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pre-commit semgrep

      - name: Cache hook scanners
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pre-commit
            ~/.cache/semgrep
          key: ${{ runner.os }}-hooks-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit hooks (pull requests)
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: pre-commit run --from-ref "origin/$BASE_REF" --to-ref "HEAD" --hook-stage pre-commit --show-diff-on-failure

      - name: Run pre-commit hooks (push)
        if: github.event_name == 'push'
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: pre-commit run --from-ref "$BEFORE_SHA" --to-ref "$CURRENT_SHA" --hook-stage pre-commit --show-diff-on-failure

      - name: Run pre-push hooks
        run: pre-commit run --all-files --hook-stage pre-push --show-diff-on-failure
