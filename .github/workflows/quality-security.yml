name: Quality and Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pre-commit-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6 # v4

      - name: Install TruffleHog
        run: |
          TRUFFLEHOG_VERSION="3.95.8"
          curl -sSfL "https://github.com/trufflesecurity/trufflehog/releases/download/v${TRUFFLEHOG_VERSION}/trufflehog_${TRUFFLEHOG_VERSION}_linux_amd64.tar.gz" -o /tmp/trufflehog.tar.gz
          # SHA256 of trufflehog_${TRUFFLEHOG_VERSION}_linux_amd64.tar.gz
          echo "136c42933697ab2e09402d003ff4259086312b80cb671e7d9ab05477597bc4f0  /tmp/trufflehog.tar.gz" | sha256sum -c -
          tar -xzf /tmp/trufflehog.tar.gz -C /usr/local/bin trufflehog
          trufflehog --version

      - name: Install hook runtime tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pre-commit semgrep

      - name: Run pre-commit hooks
        run: pre-commit run --all-files --hook-stage pre-commit --show-diff-on-failure

      - name: Run pre-push hooks
        run: pre-commit run --all-files --hook-stage pre-push --show-diff-on-failure
