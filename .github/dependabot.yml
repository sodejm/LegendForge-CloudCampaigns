version: 2
updates:
  # ---------------------------------------------------------
  # 1. GitHub Actions
  # ---------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "actions"
    # Group all action updates into a single PR
    groups:
      github-actions:
        patterns:
          - "*"

  # ---------------------------------------------------------
  # 2. Terraform Deployments
  # ---------------------------------------------------------
  # AWS Infrastructure
  - package-ecosystem: "terraform"
    directory: "/infrastructure/deployments/aws"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "terraform"
      - "aws"
    groups:
      aws-terraform-updates:
        patterns:
          - "*"

  # Azure Infrastructure
  - package-ecosystem: "terraform"
    directory: "/infrastructure/deployments/azure"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "terraform"
      - "azure"
    groups:
      azure-terraform-updates:
        patterns:
          - "*"

  # GCP Infrastructure
  - package-ecosystem: "terraform"
    directory: "/infrastructure/deployments/gcp"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "terraform"
      - "gcp"
    groups:
      gcp-terraform-updates:
        patterns:
          - "*"

  # Hetzner Infrastructure
  - package-ecosystem: "terraform"
    directory: "/infrastructure/deployments/hetzner"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "terraform"
      - "hetzner"
    groups:
      hetzner-terraform-updates:
        patterns:
          - "*"
